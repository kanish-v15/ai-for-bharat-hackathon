version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd swasthya-mitra/frontend
        - npm ci
    build:
      commands:
        - cd swasthya-mitra/frontend
        - npm run build
  artifacts:
    baseDirectory: swasthya-mitra/frontend/dist
    files:
      - '**/*'
  cache:
    paths:
      - swasthya-mitra/frontend/node_modules/**/*
